<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Get your edge back — 8-week sharpening</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --bg:#FFFBF3; --surface:#FFFFFF; --surface2:#FFF3E1; --line:#EDE7FB; --lineSoft:#F4F0FD;
    --text:#2B2B3D; --sub:#6E6E8C; --faint:#A2A2BD;
    --code:#10B894; --design:#3B82F6; --behavioral:#F5A623; --review:#A855F7; --read:#0EA5C4; --streak:#FF5E3A;
    --display:'Fraunces',Georgia,serif; --body:'Inter',system-ui,-apple-system,sans-serif; --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  @keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  @keyframes popCheck{0%{transform:scale(0)}55%{transform:scale(1.3)}100%{transform:scale(1)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(220%)}}
  @keyframes confettiPop{0%{transform:translate(0,0) rotate(0deg);opacity:1}100%{transform:translate(var(--cx),var(--cy)) rotate(var(--cr));opacity:0}}
  @keyframes cardIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.5}}
  body{background:linear-gradient(120deg,#FFF3E0,#FDEBFF,#E8F6FF,#FFFBE8);background-size:300% 300%;animation:bgShift 16s ease infinite;background-attachment:fixed;min-height:100vh;color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:680px;margin:0 auto;padding:34px 20px 80px;}
  a{color:inherit;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--code);}
  h1{font-family:var(--display);font-size:40px;font-weight:600;margin:8px 0 0;letter-spacing:-.01em;line-height:1.02;}
  .tagline{font-family:var(--display);font-size:18px;font-style:italic;color:var(--sub);margin-top:6px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:0 10px 30px -18px rgba(80,60,160,.25);animation:cardIn .35s ease both;}
  .stats{display:flex;gap:14px;margin-top:26px;padding:18px;flex-wrap:wrap;}
  .stat{flex:1;min-width:76px;}
  .stat .num{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;}
  .stat .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:6px;}
  .bar{margin-top:14px;height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;position:relative;}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--code),var(--design));border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;}
  .bar > i::after{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);animation:shimmer 2.2s ease-in-out infinite;}
  .daterow{margin-top:14px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;color:var(--faint);flex-wrap:wrap;}
  .daterow span.k{letter-spacing:.06em;text-transform:uppercase;}
  input[type=date]{background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:5px 8px;font-family:var(--mono);font-size:12px;color-scheme:light;}
  .sectlabel{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin:30px 0 10px;}
  .today{padding:20px 20px 14px;background:var(--surface);border:1px solid var(--code);border-radius:18px;box-shadow:0 18px 40px -24px var(--code);animation:cardIn .4s ease both;}
  .today .top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .today .wk{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--code);}
  .today .focus{font-family:var(--display);font-size:23px;font-weight:600;margin-top:3px;}
  .today .theme{font-size:12.5px;color:var(--sub);margin-top:2px;}
  .today .date{font-family:var(--mono);font-size:11px;color:var(--faint);}
  .hr{height:1px;background:var(--line);margin:14px 0 4px;}
  .note{color:var(--sub);font-size:13px;line-height:1.5;margin:4px 0 12px;border-left:2px solid var(--line);padding-left:10px;font-style:italic;}
  .task{display:flex;gap:12px;align-items:flex-start;padding:9px 0;}
  .chk{width:22px;height:22px;border-radius:7px;flex-shrink:0;cursor:pointer;border:1.5px solid var(--line);background:transparent;display:flex;align-items:center;justify-content:center;transition:transform .15s ease,background .15s ease,border-color .15s ease;padding:0;margin-top:1px;}
  .chk:hover{transform:scale(1.08);border-color:var(--sub);}
  .chk:active{transform:scale(.88);}
  .chk.on{border-style:solid;}
  .chk.on.pop{animation:popCheck .35s cubic-bezier(.34,1.56,.64,1);}
  .chk svg{display:none;}
  .chk.on svg{display:block;}
  .task-body{flex:1;min-width:0;}
  .task .kind{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
  .task .meta{font-family:var(--mono);font-size:10px;color:var(--faint);}
  .task .lbl{font-size:14.5px;line-height:1.45;margin-top:2px;color:var(--text);}
  .task.done .lbl{color:var(--faint);text-decoration:line-through;text-decoration-color:var(--line);}
  .task .lbl a{text-decoration:none;border-bottom:1px dotted var(--line);}
  .task .lbl a:hover{border-color:var(--sub);}
  /* timer */
  .timer-row{display:flex;align-items:center;gap:6px;margin-top:5px;}
  .tbtn{background:transparent;border:1px solid var(--line);border-radius:6px;width:22px;height:22px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;color:var(--faint);transition:all .15s;flex-shrink:0;line-height:1;}
  .tbtn:hover{border-color:var(--sub);color:var(--text);}
  .tbtn.running{border-color:var(--streak);color:var(--streak);animation:timerPulse 1.4s ease-in-out infinite;}
  .tval{font-family:var(--mono);font-size:11px;color:var(--faint);min-width:36px;}
  .tval.running{color:var(--streak);}
  .tval.has-time{color:var(--sub);}
  /* extra problems */
  .add-extra-btn{display:flex;align-items:center;gap:8px;margin-top:6px;padding:7px 10px;border:1px dashed var(--line);border-radius:10px;background:none;cursor:pointer;width:100%;text-align:left;transition:all .2s ease;}
  .add-extra-btn:hover{border-color:var(--code);background:rgba(16,184,148,.05);}
  .add-extra-btn .ae-icon{font-size:14px;flex-shrink:0;}
  .add-extra-btn .ae-text{font-family:var(--mono);font-size:10px;color:var(--faint);}
  .add-extra-btn:hover .ae-text{color:var(--code);}
  .add-extra-btn .ae-preview{font-size:12px;color:var(--sub);margin-left:auto;font-family:var(--mono);flex-shrink:0;}
  .extra-badge{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;background:var(--surface2);color:var(--streak);border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle;}
  /* rest of existing styles */
  .recent{overflow:hidden;}
  .recent .row{display:flex;justify-content:space-between;gap:12px;padding:10px 14px;align-items:center;transition:background .15s ease;}
  .recent .row:hover{background:var(--surface2);}
  .recent .row + .row{border-top:1px solid var(--lineSoft);}
  .recent .row .t{font-size:13px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .recent .row .when{font-family:var(--mono);font-size:10.5px;color:var(--faint);flex-shrink:0;}
  .wk{margin-bottom:10px;background:var(--surface);border:1px solid var(--lineSoft);border-radius:14px;overflow:hidden;box-shadow:0 6px 18px -16px rgba(80,60,160,.3);transition:box-shadow .2s ease,transform .2s ease;}
  .wk:hover{transform:translateY(-1px);box-shadow:0 10px 22px -14px rgba(80,60,160,.35);}
  .wk.open{border-color:var(--line);}
  .wk-head{width:100%;text-align:left;background:transparent;border:none;cursor:pointer;padding:15px 16px;display:flex;align-items:center;gap:12px;color:inherit;transition:background .15s ease;}
  .wk-head:hover{background:var(--surface2);}
  .wk-head .idx{font-family:var(--mono);font-size:12px;color:var(--faint);width:26px;flex-shrink:0;}
  .wk-head .th{font-family:var(--display);font-size:17px;font-weight:600;}
  .wk-head .sb{font-size:12px;color:var(--sub);margin-top:1px;}
  .wk-head .cnt{font-family:var(--mono);font-size:11px;color:var(--faint);flex-shrink:0;}
  .wk-head .cnt.full{color:var(--code);}
  .wk-head .car{color:var(--faint);transition:transform .2s;flex-shrink:0;}
  .wk.open .wk-head .car{transform:rotate(90deg);}
  .wk-body{padding:0 16px 8px;}
  .dayblock{border-top:1px solid var(--lineSoft);padding:12px 0;}
  .dayhead{display:flex;align-items:baseline;gap:10px;}
  .dayhead .dn{font-family:var(--mono);font-size:12px;color:var(--sub);width:34px;}
  .dayhead .dn.done{color:var(--code);}
  .dayhead .df{font-size:13.5px;font-weight:500;}
  .dayhead .dd{font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:auto;}
  .dayinner{padding-left:44px;margin-top:2px;}
  .restbox{padding:14px 0 4px;}
  .restbox .k{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
  .restbox .m{color:var(--sub);font-size:14.5px;line-height:1.6;margin-top:8px;font-style:italic;font-family:var(--display);}
  .footer{margin-top:36px;text-align:center;}
  .btn{background:transparent;border:1px solid var(--line);color:var(--faint);border-radius:9px;padding:8px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:.05em;margin:0 5px;transition:all .15s ease;}
  .btn:hover{color:var(--text);border-color:var(--sub);background:var(--surface2);transform:translateY(-1px);}
  .foot-note{color:var(--faint);font-size:12px;margin-top:16px;line-height:1.6;font-family:var(--display);font-style:italic;}
  .finished{padding:28px 22px;background:var(--surface);border:1px solid var(--code);border-radius:18px;animation:cardIn .4s ease both;}
  .finished .h{font-family:var(--display);font-size:24px;font-weight:600;}
  .finished .p{color:var(--sub);margin-top:8px;line-height:1.6;}
  .confetti{position:fixed;top:0;left:0;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:999;animation:confettiPop .8s ease-out forwards;}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important;transition:none !important;} body{background:var(--bg) !important;} }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script>
var COLOR={code:"var(--code)",design:"var(--design)",behavioral:"var(--behavioral)",review:"var(--review)",read:"var(--read)"};
var KIND={code:{c:"var(--code)",tag:"code"},design:{c:"var(--design)",tag:"system design"},behavioral:{c:"var(--behavioral)",tag:"behavioral"},review:{c:"var(--review)",tag:"review"},read:{c:"var(--read)",tag:"read"}};
function lc(n){return"https://www.google.com/search?q="+encodeURIComponent("leetcode "+n);}
function code(name,diff){return{kind:"code",label:name,meta:diff,url:lc(name)};}
function design(label){return{kind:"design",label:label};}
function beh(label){return{kind:"behavioral",label:label};}
function rev(label){return{kind:"review",label:label};}
function read(label){return{kind:"read",label:label};}

// ─── Curated extra-problems bank per week ───────────────────────────────────
// Each entry is aligned to that week's pattern and targets FAANG interview depth.
// Ordered from "most bang for your buck" to increasingly specialized.
var EXTRA_BANK=[
  // W0 · Arrays · Hashing · Two Pointers
  [code("Longest Consecutive Sequence","Medium"),   // Google/Meta: HashSet O(n), deceptively elegant
   code("Subarray Sum Equals K","Medium"),          // Amazon: prefix-sum + hash, very common
   code("Find All Anagrams in a String","Medium"),  // sliding window + freq map
   code("Minimum Window Substring","Hard"),         // FAANG staple — sliding window mastery
   code("Sort Colors","Medium"),                    // Dutch National Flag — in-place 3-way partition
   code("Two Sum II - Input Array Is Sorted","Medium"), // two-pointer on sorted array
   code("Four Sum","Medium"),                       // generalises k-sum reduction pattern
   code("Pairs of Songs With Total Durations Divisible by 60","Medium")], // Spotify/Apple — modulo hash
  // W1 · Sliding Window · Stack · Binary Search
  [code("Sliding Window Maximum","Hard"),           // deque, asked at Google/Amazon/Meta
   code("Largest Rectangle in Histogram","Hard"),   // monotonic stack, Google flagship
   code("Koko Eating Bananas","Medium"),            // binary search on answer — Amazon OA classic
   code("Find Minimum in Rotated Sorted Array","Medium"), // binary search variant, everywhere
   code("Capacity To Ship Packages Within D Days","Medium"), // binary search on answer
   code("Time Based Key-Value Store","Medium"),     // binary search + design hybrid
   code("Asteroid Collision","Medium"),             // stack mechanics, Airbnb/Google
   code("Removing Stars From a String","Medium")],  // stack, clean and fast to solve
  // W2 · Linked Lists · Trees intro
  [code("Add Two Numbers","Medium"),                // Amazon/Google classic — LL arithmetic
   code("Merge K Sorted Lists","Hard"),             // heap merge, appears everywhere at FAANG
   code("Find the Duplicate Number","Medium"),      // Floyd's cycle detection on array — brilliant
   code("Binary Tree Right Side View","Medium"),    // BFS, Meta's most-asked tree question
   code("Path Sum II","Medium"),                    // DFS + backtrack, ubiquitous
   code("Diameter of Binary Tree","Easy"),          // elegant single-pass recursion
   code("Flatten Binary Tree to Linked List","Medium"), // in-place tree reshaping
   code("Count Good Nodes in Binary Tree","Medium")], // DFS max-tracking, Amazon
  // W3 · Trees · Tries · Heaps
  [code("Binary Tree Maximum Path Sum","Hard"),     // Google/Meta — hardest pure tree problem
   code("Word Search II","Hard"),                   // Trie + backtracking, FAANG
   code("Design Add and Search Words Data Structure","Medium"), // Trie + DFS with wildcards
   code("Task Scheduler","Medium"),                 // greedy + heap, Amazon's favourite
   code("Meeting Rooms II","Medium"),               // heap interval scheduling, extremely common
   code("Reorganize String","Medium"),              // heap greedy, Google
   code("Path Sum III","Medium"),                   // prefix sum on tree, tricky — Meta
   code("Top K Frequent Words","Medium")],          // heap + custom comparator
  // W4 · Backtracking · Graphs
  [code("Letter Combinations of a Phone Number","Medium"), // backtrack, asked at every FAANG
   code("Palindrome Partitioning","Medium"),        // backtrack + DP memoisation
   code("Word Ladder","Hard"),                      // BFS on implicit graph — Google classic
   code("Rotting Oranges","Medium"),                // multi-source BFS, Amazon OA
   code("Walls and Gates","Medium"),                // multi-source BFS, Meta
   code("Alien Dictionary","Hard"),                 // topo sort + graph — top FAANG question
   code("Surrounded Regions","Medium"),             // DFS from boundary, Airbnb
   code("Minimum Genetic Mutation","Medium")],      // BFS word graph, Google
  // W5 · Graphs · 1-D Dynamic Programming
  [code("Cheapest Flights Within K Stops","Medium"), // Bellman-Ford / Dijkstra, Amazon
   code("Network Delay Time","Medium"),             // pure Dijkstra, Google
   code("Longest Increasing Subsequence","Medium"), // DP O(n log n), FAANG very common
   code("Word Break","Medium"),                     // DP + string, Amazon classic
   code("Maximum Product Subarray","Medium"),       // DP with sign-flip — tricky edge cases
   code("Partition Equal Subset Sum","Medium"),     // 0/1 knapsack — DP foundation
   code("Jump Game II","Medium"),                   // greedy DP, elegant O(n)
   code("Minimum Path Sum","Medium")],              // 2-D DP preview, clean formulation
  // W6 · 2-D DP · Greedy · Intervals
  [code("Edit Distance","Hard"),                    // Google classic — Levenshtein, must-know
   code("Regular Expression Matching","Hard"),      // Google legendary — hardest DP
   code("Burst Balloons","Hard"),                   // interval DP — mind-bending but learnable
   code("Gas Station","Medium"),                    // greedy circular array, Amazon
   code("Minimum Number of Arrows to Burst Balloons","Medium"), // greedy interval cover
   code("Russian Doll Envelopes","Hard"),           // 2-D LIS, advanced DP
   code("Wiggle Subsequence","Medium"),             // greedy DP, elegant
   code("Distinct Subsequences","Hard")],           // DP string transformation — Meta/Google
  // W7 · Dress Rehearsal — all killer, no filler
  [code("Serialize and Deserialize Binary Tree","Hard"), // coding × system design fusion
   code("Median of Two Sorted Arrays","Hard"),      // binary search legendary — every FAANG
   code("Word Ladder II","Hard"),                   // BFS + backtrack, Google hardest
   code("Sliding Window Maximum","Hard"),           // revisit if shaky
   code("LFU Cache","Hard"),                        // design follow-up to LRU
   code("Alien Dictionary","Hard"),                 // revisit if shaky
   code("Regular Expression Matching","Hard"),      // revisit if shaky
   code("Edit Distance","Hard")]                    // revisit if shaky
];
// ────────────────────────────────────────────────────────────────────────────

var PLAN=[
  {theme:"Knock off the rust",sub:"Arrays · Hashing · Two Pointers",days:[
    {d:"Mon",focus:"Gentle restart",note:"Don't time yourself today. Just remember how it feels to solve one.",tasks:[code("Two Sum","Easy"),code("Valid Anagram","Easy")]},
    {d:"Tue",focus:"Hashing patterns",tasks:[code("Group Anagrams","Medium"),code("Top K Frequent Elements","Medium")]},
    {d:"Wed",focus:"Prefix & product tricks",tasks:[code("Product of Array Except Self","Medium"),code("Contains Duplicate","Easy")]},
    {d:"Thu",focus:"Two pointers",tasks:[code("Valid Palindrome","Easy"),code("3Sum","Medium")]},
    {d:"Fri",focus:"Design foundations",tasks:[read("Client/server, latency vs throughput, the numbers every engineer should know"),beh("Draft STAR story #1 — a time you disagreed with a teammate")]},
    {d:"Sat",focus:"Light reps + review",tasks:[code("Container With Most Water","Medium"),rev("Redo one shaky problem from this week — no notes")]},
    {d:"Sun",rest:true,note:"Close the laptop. Seriously. Week 1 is in the bank."}
  ]},
  {theme:"Windows & stacks",sub:"Sliding Window · Stack · Binary Search",days:[
    {d:"Mon",focus:"Sliding window intro",tasks:[code("Best Time to Buy and Sell Stock","Easy"),code("Longest Substring Without Repeating Characters","Medium")]},
    {d:"Tue",focus:"Window, harder",tasks:[code("Longest Repeating Character Replacement","Medium"),code("Permutation in String","Medium")]},
    {d:"Wed",focus:"Stacks",tasks:[code("Valid Parentheses","Easy"),code("Min Stack","Medium")]},
    {d:"Thu",focus:"Monotonic + search",tasks:[code("Daily Temperatures","Medium"),code("Binary Search","Easy")]},
    {d:"Fri",focus:"Design: storage",tasks:[design("Databases 101 — SQL vs NoSQL, indexing, when to denormalize"),beh("Draft STAR story #2 — delivering under a tight deadline")]},
    {d:"Sat",focus:"Stretch + review",tasks:[code("Search in Rotated Sorted Array","Medium"),rev("Redo a sliding-window problem from memory")]},
    {d:"Sun",rest:true,note:"Rest day. Let it consolidate."}
  ]},
  {theme:"Pointers in motion",sub:"Linked Lists · Trees (intro)",days:[
    {d:"Mon",focus:"List basics",tasks:[code("Reverse Linked List","Easy"),code("Merge Two Sorted Lists","Easy")]},
    {d:"Tue",focus:"Cycles & reshaping",tasks:[code("Linked List Cycle","Easy"),code("Reorder List","Medium")]},
    {d:"Wed",focus:"Trickier lists",tasks:[code("Remove Nth Node From End of List","Medium"),code("Copy List With Random Pointer","Medium")]},
    {d:"Thu",focus:"First trees",tasks:[code("Invert Binary Tree","Easy"),code("Maximum Depth of Binary Tree","Easy"),code("Same Tree","Easy")]},
    {d:"Fri",focus:"Design: scale",tasks:[design("Scaling — caching, CDNs, load balancing, replication vs sharding"),beh("Draft STAR story #3 — a failure and what you learned")]},
    {d:"Sat",focus:"Build + review",tasks:[code("LRU Cache","Medium"),rev("Re-implement a linked-list problem from scratch")]},
    {d:"Sun",rest:true,note:"Halfway through the warm-up. Breathe."}
  ]},
  {theme:"Into the trees",sub:"Trees · Tries · Heaps",days:[
    {d:"Mon",focus:"Traversal & BST",tasks:[code("Binary Tree Level Order Traversal","Medium"),code("Validate Binary Search Tree","Medium")]},
    {d:"Tue",focus:"BST navigation",tasks:[code("Kth Smallest Element in a BST","Medium"),code("Lowest Common Ancestor of a BST","Medium")]},
    {d:"Wed",focus:"Build & tries",tasks:[code("Construct Binary Tree from Preorder and Inorder Traversal","Medium"),code("Implement Trie (Prefix Tree)","Medium")]},
    {d:"Thu",focus:"Heaps",tasks:[code("Kth Largest Element in an Array","Medium"),code("Last Stone Weight","Easy")]},
    {d:"Fri",focus:"Design: a real system",tasks:[design("Design a URL shortener — API, schema, scale, walk it end to end"),beh("Draft STAR story #4 — taking ownership of something messy")]},
    {d:"Sat",focus:"One hard, slowly",tasks:[code("Find Median from Data Stream","Hard"),rev("Say one STAR story out loud — time it, aim ~2 min")]},
    {d:"Sun",rest:true,note:"Rest. You now have all 4 stories drafted."}
  ]},
  {theme:"Branch & explore",sub:"Backtracking · Graphs (intro)",days:[
    {d:"Mon",focus:"Backtracking",tasks:[code("Subsets","Medium"),code("Combination Sum","Medium")]},
    {d:"Tue",focus:"More backtracking",tasks:[code("Permutations","Medium"),code("Word Search","Medium")]},
    {d:"Wed",focus:"Graph traversal",tasks:[code("Number of Islands","Medium"),code("Clone Graph","Medium")]},
    {d:"Thu",focus:"Grid DFS/BFS",tasks:[code("Max Area of Island","Medium"),code("Pacific Atlantic Water Flow","Medium")]},
    {d:"Fri",focus:"Design: object-oriented",tasks:[design("Design a parking lot — entities, states, edge cases, capacity"),beh("Record yourself answering STAR #1 — watch it back, no cringing")]},
    {d:"Sat",focus:"Topo sort + review",tasks:[code("Course Schedule","Medium"),rev("Redo any graph problem that bit you")]},
    {d:"Sun",rest:true,note:"Rest day. The hard stuff starts feeling normal soon."}
  ]},
  {theme:"Graphs & first DP",sub:"Graphs · 1-D Dynamic Programming",days:[
    {d:"Mon",focus:"Graph structure",tasks:[code("Course Schedule II","Medium"),code("Number of Connected Components in an Undirected Graph","Medium")]},
    {d:"Tue",focus:"Union find",tasks:[code("Graph Valid Tree","Medium"),code("Redundant Connection","Medium")]},
    {d:"Wed",focus:"DP foundations",tasks:[code("Climbing Stairs","Easy"),code("House Robber","Medium")]},
    {d:"Thu",focus:"DP patterns",tasks:[code("House Robber II","Medium"),code("Longest Palindromic Substring","Medium")]},
    {d:"Fri",focus:"Design: messaging",tasks:[design("Design a chat system (WhatsApp) — delivery, presence, fan-out"),beh("Behavioral mock — run all 4 stories back to back, out loud")]},
    {d:"Sat",focus:"Classic DP",tasks:[code("Coin Change","Medium"),code("Decode Ways","Medium")]},
    {d:"Sun",rest:true,note:"Rest. Two weeks left — you're in good shape."}
  ]},
  {theme:"Closing patterns",sub:"2-D DP · Greedy · Intervals",days:[
    {d:"Mon",focus:"Grid DP",tasks:[code("Unique Paths","Medium"),code("Longest Common Subsequence","Medium")]},
    {d:"Tue",focus:"2-D DP",tasks:[code("Coin Change II","Medium"),code("Maximum Subarray","Medium")]},
    {d:"Wed",focus:"Greedy + intervals",tasks:[code("Jump Game","Medium"),code("Insert Interval","Medium")]},
    {d:"Thu",focus:"Interval mastery",tasks:[code("Merge Intervals","Medium"),code("Non-overlapping Intervals","Medium")]},
    {d:"Fri",focus:"Design: object-oriented",tasks:[design("Design an elevator system — state machine, scheduling, multiple cars"),beh("Write a one-line headline for each of your 4 stories")]},
    {d:"Sat",focus:"One hard, earned",tasks:[code("Trapping Rain Water","Hard"),rev("Pick your weakest topic — do one more problem from it")]},
    {d:"Sun",rest:true,note:"Last rest before the dress rehearsal. Enjoy it."}
  ]},
  {theme:"Dress rehearsal",sub:"Mocks · Integration · Confidence",days:[
    {d:"Mon",focus:"Coding mock",tasks:[rev("Mock coding interview — 2 random mediums, 45 min, timed, talk out loud"),beh("Note which story fits a 'tell me about a hard problem' prompt")]},
    {d:"Tue",focus:"Fix-ups",tasks:[rev("Redo anything from Monday that felt off — clean it up"),code("Random pick — one problem you've never seen","Medium")]},
    {d:"Wed",focus:"Design mock",tasks:[design("Mock system design — 45 min, pick fresh: news feed, ride-share, or file storage")]},
    {d:"Thu",focus:"Behavioral mock",tasks:[beh("Full behavioral mock — have a friend or AI ask follow-ups"),rev("Drill one pattern that still feels shaky")]},
    {d:"Fri",focus:"Final design",tasks:[design("Final design — rate limiter, notification system, or OOD vending machine"),beh("Read your 4 story headlines one last time")]},
    {d:"Sat",focus:"Confidence pass",tasks:[rev("Re-skim your notes/cheat sheets"),code("One easy problem — just to feel fast, then stop","Easy")]},
    {d:"Sun",rest:true,note:"You're ready. Rest up — and good luck."}
  ]}
];

var FLAT=[],TASK_BY_ID={},FLAT_IDS={},STUDY_DAYS=[];
PLAN.forEach(function(wk,w){wk.days.forEach(function(day,d){
  var dayKey="w"+w+"d"+d;
  if(!day.rest)STUDY_DAYS.push({w:w,d:d});
  (day.tasks||[]).forEach(function(t,i){
    var id=dayKey+"t"+i;
    var obj=Object.assign({id:id,dayKey:dayKey,w:w,d:d},t);
    FLAT.push(obj);FLAT_IDS[id]=true;TASK_BY_ID[id]=obj;
  });
});});
var TOTAL_TASKS=FLAT.length;
var TOTAL_CODE=FLAT.filter(function(t){return t.kind==="code";}).length;
var KEY="sharpen_v1";
var state={progress:{},start:null,openWeek:0,justToggled:null,timers:{},extras:{},extraIdx:{}};

function load(){
  try{
    var raw=localStorage.getItem(KEY);
    if(raw){
      var s=JSON.parse(raw);
      state.progress=s.progress||{};
      state.start=s.start||null;
      state.timers=s.timers||{};
      state.extras=s.extras||{};
      state.extraIdx=s.extraIdx||{};
      Object.keys(state.extras).forEach(function(dk){
        (state.extras[dk]||[]).forEach(function(t){if(t&&t.id)TASK_BY_ID[t.id]=t;});
      });
    }
  }catch(e){}
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify({progress:state.progress,start:state.start,timers:state.timers,extras:state.extras,extraIdx:state.extraIdx}));}
  catch(e){}
}
function dayTasks(w,d){return FLAT.filter(function(t){return t.w===w&&t.d===d;});}
function isDayDone(w,d){var ts=dayTasks(w,d);return ts.length>0&&ts.every(function(t){return state.progress[t.id];});}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function relTime(iso){if(!iso)return"";var diff=Date.now()-new Date(iso).getTime(),m=Math.floor(diff/60000);if(m<1)return"just now";if(m<60)return m+"m ago";var h=Math.floor(m/60);if(h<24)return h+"h ago";var dd=Math.floor(h/24);if(dd<7)return dd+"d ago";return new Date(iso).toLocaleDateString(undefined,{month:"short",day:"numeric"});}
function fmtDate(gi){if(!state.start)return null;var dt=new Date(state.start+"T00:00:00");dt.setDate(dt.getDate()+gi);return dt.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});}
function fmtTime(ms){
  if(!ms||ms<0)return"0:00";
  var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  var ss=s%60,mm=m%60;
  if(h>0)return h+":"+(mm<10?"0":"")+mm+":"+(ss<10?"0":"")+ss;
  return m+":"+(ss<10?"0":"")+ss;
}
function getDisplayTime(id){
  var ti=state.timers[id];if(!ti)return 0;
  return ti.elapsed+(ti.running&&ti.startedAt?Date.now()-ti.startedAt:0);
}

// ─── Timer live-tick — updates only timer elements, no full re-render ────────
setInterval(function(){
  document.querySelectorAll('[data-tv]').forEach(function(el){
    var id=el.getAttribute('data-tv');
    var ms=getDisplayTime(id);
    var ti=state.timers[id];
    var running=ti&&ti.running;
    el.textContent=fmtTime(ms);
    el.className='tval'+(running?' running':ms>0?' has-time':'');
  });
  document.querySelectorAll('[data-tt]').forEach(function(btn){
    var id=btn.getAttribute('data-tt');
    var ti=state.timers[id];
    var running=ti&&ti.running;
    btn.className='tbtn'+(running?' running':'');
    btn.title=running?'Stop timer':'Start timer';
    btn.innerHTML=running?'⏸':'▶';
  });
},500);

var CHECK_SVG='<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var REDUCED_MOTION=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function burstConfetti(x,y,n){
  if(REDUCED_MOTION)return;
  var colors=["var(--code)","var(--design)","var(--behavioral)","var(--review)","var(--streak)"];
  for(var i=0;i<n;i++){
    var el=document.createElement('div');el.className='confetti';
    var ang=Math.random()*Math.PI*2,dist=40+Math.random()*70;
    el.style.left=x+'px';el.style.top=y+'px';
    el.style.background=colors[i%colors.length];
    el.style.setProperty('--cx',(Math.cos(ang)*dist)+'px');
    el.style.setProperty('--cy',(Math.sin(ang)*dist-30)+'px');
    el.style.setProperty('--cr',(Math.random()*360)+'deg');
    if(Math.random()>.5)el.style.borderRadius='50%';
    document.body.appendChild(el);
    (function(node){setTimeout(function(){node.remove();},850);})(el);
  }
}

function taskHTML(t){
  var on=!!state.progress[t.id];
  var k=KIND[t.kind];
  var pop=on&&state.justToggled===t.id;
  var label=t.url?'<a href="'+t.url+'" target="_blank" rel="noreferrer">'+esc(t.label)+'</a>':esc(t.label);
  var isExtra=!FLAT_IDS[t.id];
  var badge=isExtra?'<span class="extra-badge">bonus</span>':'';
  var ms=getDisplayTime(t.id);
  var ti=state.timers[t.id];
  var running=ti&&ti.running;
  var timerHTML='<div class="timer-row">'
    +'<button class="tbtn'+(running?' running':'')+'" data-tt="'+t.id+'" title="'+(running?'Stop timer':'Start timer')+'">'+(running?'⏸':'▶')+'</button>'
    +'<span class="tval'+(running?' running':ms>0?' has-time':'')+'" data-tv="'+t.id+'">'+fmtTime(ms)+'</span>'
    +'</div>';
  return'<div class="task'+(on?' done':'')+'"><button class="chk'+(on?' on':'')+(pop?' pop':'')+'" data-task="'+t.id+'" aria-pressed="'+on+'" style="'+(on?'background:'+k.c+';border-color:'+k.c:'border-color:var(--line)')+'">'+CHECK_SVG+'</button>'
    +'<div class="task-body"><div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap"><span class="kind" style="color:'+k.c+'">'+k.tag+'</span>'+(t.meta?'<span class="meta">'+esc(t.meta)+'</span>':'')+badge+'</div>'
    +'<div class="lbl">'+label+'</div>'
    +timerHTML
    +'</div></div>';
}

function addExtraBtn(w,dayKey){
  var bank=EXTRA_BANK[w];
  if(!bank||!bank.length)return'';
  var used=state.extraIdx[w]||0;
  if(used>=bank.length)return'';
  var next=bank[used];
  return'<button class="add-extra-btn" data-add-extra="'+w+':'+dayKey+'">'
    +'<span class="ae-icon">＋</span>'
    +'<span class="ae-text">add a problem</span>'
    +'<span class="ae-preview">'+esc(next.label)+' · '+esc(next.meta||'')+'</span>'
    +'</button>';
}

function dayBodyHTML(w,d,day){
  var dayKey="w"+w+"d"+d;
  var gi=w*7+d,dl=fmtDate(gi);
  if(day.rest){return'<div class="restbox"><div class="k">rest day'+(dl?' · '+dl:'')+'</div><div class="m">'+esc(day.note)+'</div></div>';}
  var html=day.note?'<div class="note">'+esc(day.note)+'</div>':'';
  html+=dayTasks(w,d).map(taskHTML).join('');
  // extras for this day
  var extras=state.extras[dayKey]||[];
  html+=extras.map(taskHTML).join('');
  // add-more button
  html+=addExtraBtn(w,dayKey);
  return html;
}

function addExtra(w,dayKey){
  var bank=EXTRA_BANK[w];
  if(!bank)return;
  var used=state.extraIdx[w]||0;
  if(used>=bank.length){alert("You've done all "+bank.length+" bonus problems for this week! That's elite energy. 🔥");return;}
  if(!state.extras[dayKey])state.extras[dayKey]=[];
  var t=bank[used];
  var id=dayKey+"e"+used;
  var obj=Object.assign({},t,{id:id,dayKey:dayKey,w:w,d:+dayKey.slice(3)});
  TASK_BY_ID[id]=obj;
  state.extras[dayKey].push(obj);
  state.extraIdx[w]=(state.extraIdx[w]||0)+1;
  save();render();
}

function todayHTML(cur){
  var w=cur.w,d=cur.d,wk=PLAN[w],day=wk.days[d],dl=fmtDate(w*7+d);
  return'<div class="today"><div class="top"><div><div class="wk">Week '+(w+1)+' · '+day.d+'</div><div class="focus">'+esc(day.focus)+'</div><div class="theme">'+esc(wk.theme)+' — '+esc(wk.sub)+'</div></div>'+(dl?'<div class="date">'+dl+'</div>':'')+'</div><div class="hr"></div>'+dayBodyHTML(w,d,day)+'</div>';
}
function statHTML(num,lbl,color,bounce){
  var st=(color?'color:'+color+';':'')+(bounce?'display:inline-block;animation:floaty 1.6s ease-in-out infinite;':'');
  return'<div class="stat"><div class="num"'+(st?' style="'+st+'"':'')+'>'+num+'</div><div class="lbl">'+lbl+'</div></div>';
}

function render(){
  var done=Object.keys(state.progress).filter(function(id){return state.progress[id]&&FLAT_IDS[id];}).length;
  var codeDone=Object.keys(state.progress).filter(function(id){return state.progress[id]&&FLAT_IDS[id]&&TASK_BY_ID[id]&&TASK_BY_ID[id].kind==="code";}).length;
  var pct=Math.min(100,Math.round((done/TOTAL_TASKS)*100));
  var sessionsDone=STUDY_DAYS.filter(function(s){return isDayDone(s.w,s.d);}).length;
  var streak=0;for(var i=0;i<STUDY_DAYS.length;i++){if(isDayDone(STUDY_DAYS[i].w,STUDY_DAYS[i].d))streak++;else break;}
  var cur=null;for(var w=0;w<PLAN.length&&!cur;w++)for(var d=0;d<PLAN[w].days.length&&!cur;d++){if(!PLAN[w].days[d].rest&&!isDayDone(w,d))cur={w:w,d:d};}
  var finished=!cur;
  if(cur&&state.openWeek===0&&!window.__weekTouched)state.openWeek=cur.w;
  var tagline=finished?"Sharp. Go get it.":pct<12?"Rust coming off.":pct<40?"Finding your rhythm.":pct<70?"Edge returning.":pct<92?"Nearly sharp.":"One last pass.";
  var recent=Object.keys(state.progress).filter(function(id){return state.progress[id]&&TASK_BY_ID[id];}).map(function(id){return{t:TASK_BY_ID[id],at:state.progress[id]};}).sort(function(a,b){return new Date(b.at)-new Date(a.at);}).slice(0,5);
  var html='<div class="eyebrow">8-week sharpening</div><h1>Get your edge back.</h1><div class="tagline">'+tagline+'</div>';
  html+='<div class="card stats">'+statHTML(pct+'%','of plan','var(--code)')+statHTML(sessionsDone,'of 48 sessions','')+statHTML(codeDone,'/ '+TOTAL_CODE+' solved','')+statHTML(streak+'🔥','day streak','var(--streak)',streak>0)+'</div>';
  html+='<div class="bar"><i style="width:'+pct+'%"></i></div>';
  html+='<div class="daterow"><span class="k">start date</span><input type="date" id="startdate" value="'+(state.start||'')+'">'+(state.start?'':'<span>optional — maps each day to a real date, no pressure if you fall behind</span>')+'</div>';
  html+='<div class="sectlabel">'+(finished?'the whole plan':'your next session')+'</div>';
  if(finished){html+='<div class="finished"><div class="h">Every box is checked.</div><div class="p">Eight weeks, 48 sessions, four stories rehearsed. The rust is gone. Walk in knowing you did the work — and remember the bar raiser just wants to see how you think, not perfection.</div></div>';}
  else{html+=todayHTML(cur);}
  if(recent.length){html+='<div class="sectlabel">recent activity</div><div class="card recent">';recent.forEach(function(r){html+='<div class="row"><span class="t"><span style="color:'+KIND[r.t.kind].c+'">•</span> '+esc(r.t.label)+'</span><span class="when">'+relTime(r.at)+'</span></div>';});html+='</div>';}
  html+='<div class="sectlabel">the full eight weeks</div>';
  PLAN.forEach(function(wk,w){
    var open=state.openWeek===w;
    var wkDone=wk.days.reduce(function(a,day,d){return a+(isDayDone(w,d)?1:0);},0);
    var wkStudy=wk.days.filter(function(x){return!x.rest;}).length;
    html+='<div class="wk'+(open?' open':'')+'"><button class="wk-head" data-week="'+w+'"><div class="idx">'+String(w+1).padStart(2,'0')+'</div><div style="flex:1;min-width:0"><div class="th">'+esc(wk.theme)+'</div><div class="sb">'+esc(wk.sub)+'</div></div><div class="cnt'+(wkDone===wkStudy?' full':'')+'">'+wkDone+'/'+wkStudy+'</div><div class="car">›</div></button>';
    if(open){
      html+='<div class="wk-body">';
      wk.days.forEach(function(day,d){
        var dDone=isDayDone(w,d),dl=fmtDate(w*7+d);
        html+='<div class="dayblock"><div class="dayhead"><span class="dn'+(dDone?' done':'')+'">'+day.d+'</span><span class="df">'+(day.rest?'Rest':esc(day.focus))+'</span>'+(dl?'<span class="dd">'+dl+'</span>':'')+'</div><div class="dayinner">'+dayBodyHTML(w,d,day)+'</div></div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });
  html+='<div class="footer"><button class="btn" id="export">export backup</button><button class="btn" id="import">import backup</button><button class="btn" id="reset">reset progress</button><input type="file" id="importfile" accept="application/json" style="display:none"><div class="foot-note">Saved automatically in this browser. Miss a day? Just pick up where you left off — the plan waits for you.</div></div>';
  var scrollY=window.scrollY;document.getElementById('root').innerHTML=html;window.scrollTo(0,scrollY);
}

document.addEventListener('click',function(e){
  // timer toggle — lightweight update, no full re-render
  var tt=e.target.closest('[data-tt]');
  if(tt){
    var id=tt.getAttribute('data-tt');
    if(!state.timers[id])state.timers[id]={elapsed:0,running:false,startedAt:null};
    var ti=state.timers[id];
    if(ti.running){
      ti.elapsed+=Date.now()-ti.startedAt;
      ti.startedAt=null;ti.running=false;
    }else{
      ti.startedAt=Date.now();ti.running=true;
    }
    save();
    return;
  }

  // add extra problem
  var ae=e.target.closest('[data-add-extra]');
  if(ae){
    var parts=ae.getAttribute('data-add-extra').split(':');
    addExtra(+parts[0],parts[1]);
    return;
  }

  // checkbox
  var chk=e.target.closest('[data-task]');
  if(chk){
    var id=chk.getAttribute('data-task');
    var turningOn=!state.progress[id];
    if(turningOn){
      state.progress[id]=new Date().toISOString();
      state.justToggled=id;
      // stop timer when task is checked off
      if(state.timers[id]&&state.timers[id].running){
        state.timers[id].elapsed+=Date.now()-state.timers[id].startedAt;
        state.timers[id].startedAt=null;state.timers[id].running=false;
      }
      var rect=chk.getBoundingClientRect();
      var t=TASK_BY_ID[id];
      var dayNowDone=t&&isDayDone(t.w,t.d);
      burstConfetti(rect.left+rect.width/2,rect.top+rect.height/2,dayNowDone?26:10);
    }else{
      delete state.progress[id];
      state.justToggled=null;
    }
    save();render();state.justToggled=null;return;
  }

  var wh=e.target.closest('[data-week]');
  if(wh){var w=+wh.getAttribute('data-week');window.__weekTouched=true;state.openWeek=(state.openWeek===w?-1:w);render();return;}
  if(e.target.id==='reset'){if(confirm("Reset all progress? This clears every check, timer, and start date.")){state.progress={};state.start=null;state.timers={};state.extras={};state.extraIdx={};save();render();}return;}
  if(e.target.id==='export'){var blob=new Blob([JSON.stringify({progress:state.progress,start:state.start,timers:state.timers,extras:state.extras,extraIdx:state.extraIdx},null,2)],{type:"application/json"});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download="sharpen-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},2000);return;}
  if(e.target.id==='import'){document.getElementById('importfile').click();return;}
});

document.addEventListener('change',function(e){
  if(e.target.id==='startdate'){state.start=e.target.value||null;save();render();return;}
  if(e.target.id==='importfile'){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var s=JSON.parse(r.result);
        state.progress=s.progress||{};state.start=s.start||null;
        state.timers=s.timers||{};state.extras=s.extras||{};state.extraIdx=s.extraIdx||{};
        Object.keys(state.extras).forEach(function(dk){(state.extras[dk]||[]).forEach(function(t){if(t&&t.id)TASK_BY_ID[t.id]=t;});});
        save();render();
      }catch(err){alert("Couldn't read that backup file.");}
    };
    r.readAsText(f);return;
  }
});

load();render();
</script>
</body>
</html>
